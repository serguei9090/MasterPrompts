pre-commit:
  parallel: true
  commands:
    lint-check:
      run: uv run ruff check {staged_files} && bunx biome check --apply --files-ignore-unknown=true {staged_files}
      glob: "*.{py,js,ts,tsx,json,css}"
    cognee-index:
      run: uv run python scripts/cognee/indexer.py
      glob: "*"
    codanna-index:
      run: codanna index . && codanna documents index
      glob: "*"
      skip:
        - merge
        - rebase

post-merge:
  commands:
    cognee-sync:
      run: uv run python scripts/cognee/indexer.py

post-checkout:
  commands:
    cognee-sync:
      run: uv run python scripts/cognee/indexer.py
