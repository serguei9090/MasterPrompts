<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Dashboard | Interactive Functions</title>
    <style>
        :root {
            --bg-color: #0D0F0E;
            --glass-bg: rgba(17, 22, 19, 0.7);
            --glass-border: #2A3430;
            --border-glow: #22C55E4D;
            --accent-primary: #22C55E;
            --accent-secondary: #8B5CF6;
            --text-primary: #E8F5EC;
            --text-secondary: #8FA898;
            --font-family: 'Inter Variable', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Animated Background Gradients */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            animation: float 25s infinite alternate-reverse;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(10%, 10%); }
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 32px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--border-glow);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-bottom: 24px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            background: #1A1F1C;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            background: var(--accent-primary);
            color: var(--bg-color);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s, transform 0.1s;
            margin-top: auto;
        }

        button:hover {
            background: #16A34A;
            box-shadow: 0 0 10px var(--border-glow);
        }

        button:active {
            transform: scale(0.98);
        }

        .result-area {
            margin-top: 24px;
            padding: 16px;
            background: var(--bg-color);
            border-radius: 8px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--glass-border);
        }

        .result-text {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            color: var(--accent-primary);
            font-size: 0.75rem;
            word-break: break-all;
            text-align: center;
        }

        .icon {
            width: 24px;
            height: 24px;
            stroke: var(--accent-primary);
            fill: none;
            stroke-width: 2;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4D6057; }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Function Lab</h1>
        <p class="subtitle">A premium dashboard exploring core logic ported from Python to JavaScript. Enter arguments below to trigger the interactive engines.</p>
    </header>

    <div class="container">
        <!-- Random Number -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 11l-8-8-8 8m2 4l6 6 6-6"/></svg>
                Randomizer
            </h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem;">Generates a secure pseudo-random integer between 1 and 100.</p>
            <div class="result-area" id="res-random">
                <span class="result-text">---</span>
            </div>
            <button type="button" onclick="runRandom()">Generate Now</button>
        </div>

        <!-- Hello Greet -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Greetings
            </h2>
            <div class="input-group">
                <label>Recipient Name</label>
                <input type="text" id="input-name" placeholder="Type a name...">
            </div>
            <div class="result-area" id="res-greet">
                <span class="result-text">---</span>
            </div>
            <button type="button" onclick="runGreet()">Say Hello</button>
        </div>

        <!-- Addition -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                Sum Engine
            </h2>
            <div style="display: flex; gap: 12px;">
                <div class="input-group">
                    <label>Value A</label>
                    <input type="number" id="add-a" value="0">
                </div>
                <div class="input-group">
                    <label>Value B</label>
                    <input type="number" id="add-b" value="0">
                </div>
            </div>
            <div class="result-area" id="res-add">
                <span class="result-text">---</span>
            </div>
            <button type="button" onclick="runAdd()">Calculate Sum</button>
        </div>

        <!-- Multiplication -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                Product Lab
            </h2>
            <div style="display: flex; gap: 12px;">
                <div class="input-group">
                    <label>Factor A</label>
                    <input type="number" id="mul-a" value="1">
                </div>
                <div class="input-group">
                    <label>Factor B</label>
                    <input type="number" id="mul-b" value="1">
                </div>
            </div>
            <div class="result-area" id="res-mul">
                <span class="result-text">---</span>
            </div>
            <button type="button" onclick="runMul()">Compute Product</button>
        </div>

        <!-- Square -->
        <div class="card">
            <h2>
                <svg class="icon" viewBox="0 0 24 24"><path d="M3 3h18v18H3zM9 9l6 6M15 9l-6 6"/></svg>
                Square Rootless
            </h2>
            <div class="input-group">
                <label>Base Number</label>
                <input type="number" id="square-n" value="2">
            </div>
            <div class="result-area" id="res-square">
                <span class="result-text">---</span>
            </div>
            <button type="button" onclick="runSquare()">Square It</button>
        </div>
    </div>

    <script>
        // --- Core Logic ---

        const logic = {
            getRandomNumber: () => Math.floor(Math.random() * 100) + 1,
            getGreeting: (name) => `hello ${name || 'friend'}`,
            add: (a, b) => Number(a) + Number(b),
            multiply: (a, b) => Number(a) * Number(b),
            square: (n) => Number(n) ** 2
        };

        // --- UI Handlers ---

        function updateResult(id, text) {
            const el = document.getElementById(id);
            const textEl = el.querySelector('.result-text');
            
            // Subtle animation on change
            textEl.style.opacity = '0';
            setTimeout(() => {
                textEl.innerText = text;
                textEl.style.opacity = '1';
                textEl.style.transition = 'opacity 0.3s ease';
            }, 100);
        }

        function runRandom() {
            const res = logic.getRandomNumber();
            updateResult('res-random', res);
        }

        function runGreet() {
            const name = document.getElementById('input-name').value;
            const res = logic.getGreeting(name);
            updateResult('res-greet', res);
        }

        function runAdd() {
            const a = document.getElementById('add-a').value;
            const b = document.getElementById('add-b').value;
            const res = logic.add(a, b);
            updateResult('res-add', res);
        }

        function runMul() {
            const a = document.getElementById('mul-a').value;
            const b = document.getElementById('mul-b').value;
            const res = logic.multiply(a, b);
            updateResult('res-mul', res);
        }

        function runSquare() {
            const n = document.getElementById('square-n').value;
            const res = logic.square(n);
            updateResult('res-square', res);
        }
    </script>
</body>
</html>
