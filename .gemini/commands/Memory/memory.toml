description = "Triggers the @memory-manager to distill current session context or audit the memory bank."
prompt = """
Task for @memory-manager:
Perform a {{args}} operation on the project memory bank.

Context:
- Current Roadmap: @docs/track/TODO.md
- Recent Changes: !{git diff --name-only HEAD~1}

Instructions:
1. If 'audit', verify the integrity of docs/memory/ and the index.md.
2. If 'distill', identify key architectural decisions or lessons from the recent changes and create new memory artifacts.
3. Use sequentialthinking for complex synthesis.
"""
